name: Build AssetsManager

"on":
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: AssetsManager-Windows.exe
            sep: ";"
          - os: macos-latest
            name: AssetsManager-Mac
            sep: ":"
          - os: ubuntu-latest
            name: AssetsManager-Linux
            sep: ":"

    runs-on: ${{ matrix.os }}

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install pywebview pyinstaller

      - name: Linux 의존성 설치
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.0 libgirepository1.0-dev gcc libcairo2-dev pkg-config

      - name: EXE 빌드
        run: |
          pyinstaller --onefile --windowed \
            --add-data "index.html${{ matrix.sep }}." \
            --name "${{ matrix.name }}" \
            main.py

      - name: 빌드 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}